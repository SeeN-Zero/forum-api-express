user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {

    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Logging
    ##
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    ##
    # Gzip
    ##
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    ##
    # RATE LIMIT (GLOBAL)
    ##
    limit_req_zone $binary_remote_addr zone=thread_limit:10m rate=90r/m;

    ##
    # HTTP → HTTPS REDIRECT
    ##
    server {
        listen 80;
        server_name sixty-mugs-cough-quietly.st.a.dcdg.xyz www.sixty-mugs-cough-quietly.st.a.dcdg.xyz;

        return 301 https://$host$request_uri;
    }

    ##
    # HTTPS SERVER
    ##
    server {
        listen 443 ssl;
        server_name sixty-mugs-cough-quietly.st.a.dcdg.xyz www.sixty-mugs-cough-quietly.st.a.dcdg.xyz;

        ssl_certificate /etc/letsencrypt/live/sixty-mugs-cough-quietly.st.a.dcdg.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sixty-mugs-cough-quietly.st.a.dcdg.xyz/privkey.pem;

        ##
        # LIMIT ONLY /threads
        ##
        location /threads {
            limit_req zone=thread_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        ##
        # OTHER ROUTES
        ##
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
