name: CD

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Google Cloud VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          debug: true
          script: |
            set -x
            echo "[CD] start deploy"
            APP_DIR="${{ secrets.APP_DIR }}"
            [ -n "$APP_DIR" ] || { echo "APP_DIR secret is empty"; exit 1; }
            APP_DIR="${APP_DIR/#\~/$HOME}"
            PROJECT_DIR="$APP_DIR/forum-api-express"

            BRANCH="${{ github.ref_name }}"
            echo "[CD] APP_DIR=$APP_DIR"
            echo "[CD] PROJECT_DIR=$PROJECT_DIR"
            echo "[CD] BRANCH=$BRANCH"
            echo "[CD] user=$(whoami), home=$HOME"

            [ -d "$PROJECT_DIR" ] || { echo "PROJECT_DIR not found: $PROJECT_DIR"; exit 1; }
            cd "$PROJECT_DIR" || exit 1
            git rev-parse --is-inside-work-tree >/dev/null 2>&1 || { echo "Not a git repository: $PROJECT_DIR"; exit 1; }
            git fetch origin "$BRANCH" || exit 1
            git checkout "$BRANCH" || exit 1
            git pull origin "$BRANCH" || exit 1

            echo "[CD] checking runtime binaries"
            command -v node || exit 1
            command -v npm || exit 1
            command -v pm2 || exit 1

            echo "[CD] installing dependencies"
            npm install || exit 1
            echo "[CD] running migration"
            npm run migrate:up || exit 1
            echo "[CD] restarting pm2 app"
            pm2 restart app || pm2 start npm --name "app" -- start || exit 1
            pm2 save || exit 1
            echo "[CD] deploy complete"
