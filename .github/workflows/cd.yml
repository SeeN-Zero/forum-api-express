name: CD

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Google Cloud VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is empty"
              exit 1
            fi

            if [ "${APP_DIR#~}" != "$APP_DIR" ]; then
              APP_DIR="$HOME/${APP_DIR#~/}"
            fi

            if [ ! -d "$APP_DIR" ]; then
              echo "APP_DIR not found: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git pull origin "${{ github.ref_name }}"
            npm install
            npm run migrate:up
            pm2 restart app || pm2 start npm --name "app" -- start
            pm2 save
