name: CD

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Google Cloud VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is empty"
              exit 1
            fi

            if [ "${APP_DIR#~}" != "$APP_DIR" ]; then
              APP_DIR="$HOME/${APP_DIR#~/}"
            fi

            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
              git pull origin "$BRANCH"
            else
              if [ -n "$(ls -A "$APP_DIR")" ]; then
                echo "APP_DIR exists but is not a git repository and not empty: $APP_DIR"
                exit 1
              fi
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            npm install
            npm run migrate:up
            pm2 restart app || pm2 start npm --name "app" -- start
            pm2 save
