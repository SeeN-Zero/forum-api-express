name: CD

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Google Cloud VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          debug: true
          script: |
            set -x
            echo "[CD] start deploy"
            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is empty"
              exit 1
            fi

            if [ "${APP_DIR#~}" != "$APP_DIR" ]; then
              APP_DIR="$HOME/${APP_DIR#~/}"
            fi

            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            echo "[CD] APP_DIR=$APP_DIR"
            echo "[CD] BRANCH=$BRANCH"
            echo "[CD] user=$(whoami), home=$HOME"

            mkdir -p "$APP_DIR" || exit 1

            IS_GIT_REPO=0
            if git -C "$APP_DIR" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              IS_GIT_REPO=1
            fi

            if [ "$IS_GIT_REPO" = "1" ]; then
              echo "[CD] existing git repo found, pull latest"
              cd "$APP_DIR"
              git fetch origin "$BRANCH" || exit 1
              git checkout "$BRANCH" || exit 1
              git pull origin "$BRANCH" || exit 1
            else
              if [ -n "$(ls -A "$APP_DIR")" ]; then
                echo "APP_DIR exists but is not a git repository and not empty: $APP_DIR"
                exit 1
              fi
              echo "[CD] cloning repository"
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$APP_DIR" || exit 1
              cd "$APP_DIR"
            fi

            echo "[CD] checking runtime binaries"
            command -v node || exit 1
            command -v npm || exit 1
            command -v pm2 || exit 1

            echo "[CD] installing dependencies"
            npm install || exit 1
            echo "[CD] running migration"
            npm run migrate:up || exit 1
            echo "[CD] restarting pm2 app"
            pm2 restart app || pm2 start npm --name "app" -- start || exit 1
            pm2 save || exit 1
            echo "[CD] deploy complete"
